{% extends "base.html" %}
{% block title %}Journal — {{ date }}{% endblock %}
{% block content %}
<div class="mb-6">
    <a href="/journal" class="inline-flex items-center gap-x-1.5 text-sm font-medium text-indigo-600 hover:text-indigo-500 transition-colors">
        <svg class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M17 10a.75.75 0 01-.75.75H5.612l4.158 3.96a.75.75 0 11-1.04 1.08l-5.5-5.25a.75.75 0 010-1.08l5.5-5.25a.75.75 0 111.04 1.08L5.612 9.25H16.25A.75.75 0 0117 10z" clip-rule="evenodd" />
        </svg>
        Back to journal
    </a>
</div>
<h1 class="text-2xl font-bold leading-7 text-gray-900 sm:text-3xl sm:tracking-tight mb-6">Journal — {{ date }}</h1>
<article class="prose prose-sm max-w-none rounded-lg bg-white shadow-sm ring-1 ring-gray-900/5 p-6">
    {{ content_html | safe }}
</article>
{% endblock %}
