<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Project Manager{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <link rel="stylesheet" href="/static/style.css">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <nav>
                <strong class="brand">Project Manager</strong>
                <ul>
                    <li><a href="/"{% if active_page == "dashboard" %} class="active"{% endif %}>Dashboard</a></li>
                    <li><a href="/tasks"{% if active_page == "tasks" %} class="active"{% endif %}>Tasks</a></li>
                    <li><a href="/raid"{% if active_page == "raid" %} class="active"{% endif %}>RAID</a></li>
                    <li><a href="/journal"{% if active_page == "journal" %} class="active"{% endif %}>Journal</a></li>
                    <li><a href="/reports"{% if active_page == "reports" %} class="active"{% endif %}>Reports</a></li>
                </ul>
            </nav>
        </aside>
        <main class="container">
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
