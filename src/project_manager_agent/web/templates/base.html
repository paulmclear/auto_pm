<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Project Manager{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="h-full">
    <div class="min-h-full">
        <!-- Mobile menu overlay -->
        <div x-data="{ open: false }">
            <!-- Mobile top bar -->
            <div class="lg:hidden flex items-center justify-between bg-gray-900 px-4 py-3">
                <span class="text-white font-semibold text-lg">Project Manager</span>
                <button @click="open = !open" class="text-gray-300 hover:text-white">
                    <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                        <path x-show="!open" stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
                        <path x-show="open" stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <!-- Mobile sidebar -->
            <div x-show="open" x-transition class="lg:hidden fixed inset-0 z-40 bg-gray-900/75" @click="open = false"></div>
            <aside x-show="open" x-transition:enter="transition ease-in-out duration-200 transform"
                   x-transition:enter-start="-translate-x-full" x-transition:enter-end="translate-x-0"
                   x-transition:leave="transition ease-in-out duration-200 transform"
                   x-transition:leave-start="translate-x-0" x-transition:leave-end="-translate-x-full"
                   class="lg:hidden fixed inset-y-0 left-0 z-50 w-64 bg-gray-900 px-6 py-4">
                <div class="flex items-center justify-between mb-4">
                    <span class="text-white font-semibold text-lg">Project Manager</span>
                    <button @click="open = false" class="text-gray-400 hover:text-white">
                        <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </button>
                </div>
                {% include "_project_switcher.html" %}
                {% include "_nav.html" %}
            </aside>
        </div>

        <!-- Desktop sidebar -->
        <aside class="hidden lg:fixed lg:inset-y-0 lg:flex lg:w-60 lg:flex-col">
            <div class="flex grow flex-col gap-y-5 overflow-y-auto bg-gray-900 px-6 py-6">
                <div class="flex items-center gap-x-3">
                    <div class="h-8 w-8 rounded-lg bg-indigo-500 flex items-center justify-center">
                        <svg class="h-5 w-5 text-white" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 016 3.75h2.25A2.25 2.25 0 0110.5 6v2.25a2.25 2.25 0 01-2.25 2.25H6a2.25 2.25 0 01-2.25-2.25V6zM3.75 15.75A2.25 2.25 0 016 13.5h2.25a2.25 2.25 0 012.25 2.25V18a2.25 2.25 0 01-2.25 2.25H6A2.25 2.25 0 013.75 18v-2.25zM13.5 6a2.25 2.25 0 012.25-2.25H18A2.25 2.25 0 0120.25 6v2.25A2.25 2.25 0 0118 10.5h-2.25a2.25 2.25 0 01-2.25-2.25V6zM13.5 15.75a2.25 2.25 0 012.25-2.25H18a2.25 2.25 0 012.25 2.25V18A2.25 2.25 0 0118 20.25h-2.25A2.25 2.25 0 0113.5 18v-2.25z" />
                        </svg>
                    </div>
                    <span class="text-white font-semibold text-lg">Project Manager</span>
                </div>
                {% include "_project_switcher.html" %}
                {% include "_nav.html" %}
            </div>
        </aside>

        <!-- Main content -->
        <main class="lg:pl-60">
            <div class="px-4 py-8 sm:px-6 lg:px-8">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>
</body>
</html>
