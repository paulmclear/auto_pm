<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Project Manager{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; color: #333; line-height: 1.6; }
        nav { background: #1a1a2e; padding: 1rem 2rem; display: flex; gap: 1.5rem; align-items: center; }
        nav a { color: #e0e0e0; text-decoration: none; font-size: 0.95rem; }
        nav a:hover { color: #fff; }
        nav .brand { font-weight: 700; font-size: 1.1rem; color: #fff; margin-right: 1rem; }
        main { max-width: 1100px; margin: 2rem auto; padding: 0 1.5rem; }
        h1 { margin-bottom: 1rem; }
        h2 { margin: 1.5rem 0 0.75rem; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 1.5rem; }
        th, td { padding: 0.5rem 0.75rem; border: 1px solid #ddd; text-align: left; font-size: 0.9rem; }
        th { background: #f5f5f5; font-weight: 600; }
        .badge { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 4px; font-size: 0.8rem; font-weight: 600; color: #fff; }
        .badge-green { background: #27ae60; }
        .badge-amber { background: #f39c12; }
        .badge-red { background: #e74c3c; }
        .badge-not_started { background: #95a5a6; }
        .badge-in_progress { background: #3498db; }
        .badge-complete { background: #27ae60; }
        .badge-blocked { background: #e74c3c; }
        .badge-open { background: #3498db; }
        .badge-closed { background: #95a5a6; }
        .badge-accepted { background: #27ae60; }
        .badge-superseded { background: #95a5a6; }
        .badge-pending { background: #f39c12; }
        .badge-achieved { background: #27ae60; }
        .badge-missed { background: #e74c3c; }
        .badge-overdue { background: #e74c3c; }
        .card { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 1.25rem; margin-bottom: 1rem; }
        .stats { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
        .stat { background: #f9f9f9; border: 1px solid #eee; border-radius: 8px; padding: 1rem 1.5rem; text-align: center; min-width: 120px; }
        .stat .number { font-size: 1.8rem; font-weight: 700; }
        .stat .label { font-size: 0.85rem; color: #666; }
        ul.date-list { list-style: none; }
        ul.date-list li { padding: 0.5rem 0; border-bottom: 1px solid #eee; }
        ul.date-list a { color: #2980b9; text-decoration: none; }
        ul.date-list a:hover { text-decoration: underline; }
        .rendered-md h1 { font-size: 1.5rem; margin: 1rem 0 0.5rem; }
        .rendered-md h2 { font-size: 1.25rem; margin: 1rem 0 0.5rem; }
        .rendered-md p { margin-bottom: 0.75rem; }
        .rendered-md ul, .rendered-md ol { margin: 0.5rem 0 0.75rem 1.5rem; }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="brand">Project Manager</a>
        <a href="/">Dashboard</a>
        <a href="/tasks">Tasks</a>
        <a href="/raid">RAID</a>
        <a href="/journal">Journal</a>
        <a href="/reports">Reports</a>
    </nav>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
