{% extends "base.html" %}
{% block title %}Messages{% endblock %}
{% block content %}
<div x-data="messagesApp()" x-init="loadMessages()" class="flex flex-col h-[calc(100vh-6rem)]">
    <!-- Header with tabs -->
    <div class="flex items-center justify-between mb-4">
        <h1 class="text-2xl font-bold text-gray-900">Messages</h1>
        <div class="flex rounded-lg border border-gray-300 overflow-hidden">
            <button @click="switchTab('inbound')"
                    :class="tab === 'inbound' ? 'bg-indigo-600 text-white' : 'bg-white text-gray-700 hover:bg-gray-50'"
                    class="px-4 py-2 text-sm font-medium transition-colors">
                Inbox
                <span x-show="unreadInbox > 0" x-text="unreadInbox"
                      class="ml-1 inline-flex items-center justify-center rounded-full bg-red-500 text-white text-xs w-5 h-5"></span>
            </button>
            <button @click="switchTab('outbound')"
                    :class="tab === 'outbound' ? 'bg-indigo-600 text-white' : 'bg-white text-gray-700 hover:bg-gray-50'"
                    class="px-4 py-2 text-sm font-medium border-l border-gray-300 transition-colors">
                Outbox
                <span x-show="unreadOutbox > 0" x-text="unreadOutbox"
                      class="ml-1 inline-flex items-center justify-center rounded-full bg-red-500 text-white text-xs w-5 h-5"></span>
            </button>
        </div>
    </div>

    <!-- Two-column layout -->
    <div class="flex flex-1 min-h-0 rounded-lg shadow-sm ring-1 ring-gray-900/5 bg-white overflow-hidden">
        <!-- Left pane: message list (~1/3) -->
        <div class="w-1/3 border-r border-gray-200 overflow-y-auto">
            <template x-if="loading">
                <div class="flex items-center justify-center py-12 text-sm text-gray-400">Loading...</div>
            </template>
            <template x-if="!loading && messages.length === 0">
                <div class="flex items-center justify-center py-12 text-sm text-gray-400">No messages.</div>
            </template>
            <ul class="divide-y divide-gray-100">
                <template x-for="msg in messages" :key="msg.id">
                    <li @click="selectMessage(msg)"
                        :class="selectedId === msg.id ? 'bg-indigo-50 border-l-2 border-indigo-600' : 'border-l-2 border-transparent hover:bg-gray-50'"
                        class="cursor-pointer px-4 py-3 transition-colors">
                        <div class="flex items-center justify-between">
                            <span :class="msg.read ? 'font-normal text-gray-700' : 'font-semibold text-gray-900'"
                                  class="text-sm truncate" x-text="tab === 'inbound' ? msg.sender : msg.recipient"></span>
                            <span class="text-xs text-gray-400 whitespace-nowrap ml-2" x-text="formatDate(msg.date)"></span>
                        </div>
                        <div class="flex items-center mt-1">
                            <span x-show="!msg.read" class="h-2 w-2 rounded-full bg-indigo-600 mr-2 flex-shrink-0"></span>
                            <p :class="msg.read ? 'text-gray-500' : 'text-gray-700'"
                               class="text-sm truncate" x-text="msg.subject"></p>
                        </div>
                    </li>
                </template>
            </ul>
        </div>

        <!-- Right pane: reading area (~2/3) -->
        <div class="w-2/3 overflow-y-auto">
            <template x-if="!selected">
                <div class="flex items-center justify-center h-full text-sm text-gray-400">
                    Select a message to read
                </div>
            </template>
            <template x-if="selected">
                <div class="p-6">
                    <div class="border-b border-gray-200 pb-4 mb-4">
                        <h2 class="text-lg font-semibold text-gray-900" x-text="selected.subject"></h2>
                        <div class="mt-2 flex flex-wrap items-center gap-x-4 text-sm text-gray-500">
                            <span>From: <span class="text-gray-700" x-text="selected.sender"></span></span>
                            <span>To: <span class="text-gray-700" x-text="selected.recipient"></span></span>
                            <span x-text="formatDate(selected.date)"></span>
                            <template x-if="selectedDetail && selectedDetail.task_id">
                                <a :href="'/projects/' + {{ project_id }} + '/tasks/' + selectedDetail.task_id"
                                   class="text-indigo-600 hover:text-indigo-800 hover:underline">
                                    Task #<span x-text="selectedDetail.task_id"></span>
                                </a>
                            </template>
                        </div>
                    </div>
                    <div class="prose prose-sm max-w-none text-gray-700 whitespace-pre-wrap"
                         x-text="selectedDetail ? selectedDetail.body : ''"></div>
                </div>
            </template>
        </div>
    </div>
</div>

<script>
function messagesApp() {
    const projectId = {{ project_id }};
    return {
        tab: 'inbound',
        messages: [],
        selected: null,
        selectedId: null,
        selectedDetail: null,
        loading: false,
        unreadInbox: 0,
        unreadOutbox: 0,

        async loadMessages() {
            this.loading = true;
            try {
                const resp = await fetch(`/api/messages?project_id=${projectId}&direction=${this.tab}`);
                const data = await resp.json();
                this.messages = data.items;
                this.unreadInbox = data.unread_inbox;
                this.unreadOutbox = data.unread_outbox;
                if (this.messages.length > 0 && !this.selected) {
                    this.selectMessage(this.messages[0]);
                }
            } finally {
                this.loading = false;
            }
        },

        switchTab(t) {
            this.tab = t;
            this.selected = null;
            this.selectedId = null;
            this.selectedDetail = null;
            this.loadMessages();
        },

        async selectMessage(msg) {
            this.selected = msg;
            this.selectedId = msg.id;
            this.selectedDetail = null;
            if (!msg.read && this.tab === 'inbound') {
                await fetch(`/api/messages/${msg.id}/read?project_id=${projectId}`, { method: 'PATCH' });
                msg.read = true;
                this.unreadInbox = Math.max(0, this.unreadInbox - 1);
            }
            const resp = await fetch(`/api/messages/${msg.id}?project_id=${projectId}`);
            this.selectedDetail = await resp.json();
        },

        formatDate(d) {
            if (!d) return '';
            const date = new Date(d);
            return date.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
        }
    };
}
</script>
{% endblock %}
