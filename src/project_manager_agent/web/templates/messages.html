{% extends "base.html" %}
{% block title %}Messages{% endblock %}
{% block content %}
<div x-data="messagesApp()" x-init="init()" class="flex flex-col h-[calc(100vh-6rem)]">
    <!-- Header with tabs -->
    <div class="flex items-center justify-between mb-4">
        <h1 class="text-2xl font-bold text-gray-900">Messages</h1>
        <div class="flex items-center gap-3">
            <button @click="openCompose()"
                    class="inline-flex items-center gap-1.5 rounded-lg bg-indigo-600 px-4 py-2 text-sm font-medium text-white hover:bg-indigo-700 transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                </svg>
                Compose
            </button>
            <div class="flex rounded-lg border border-gray-300 overflow-hidden">
                <button @click="switchTab('inbound')"
                        :class="tab === 'inbound' ? 'bg-indigo-600 text-white' : 'bg-white text-gray-700 hover:bg-gray-50'"
                        class="px-4 py-2 text-sm font-medium transition-colors">
                    Inbox
                    <span x-show="unreadInbox > 0" x-text="unreadInbox"
                          class="ml-1 inline-flex items-center justify-center rounded-full bg-red-500 text-white text-xs w-5 h-5"></span>
                </button>
                <button @click="switchTab('outbound')"
                        :class="tab === 'outbound' ? 'bg-indigo-600 text-white' : 'bg-white text-gray-700 hover:bg-gray-50'"
                        class="px-4 py-2 text-sm font-medium border-l border-gray-300 transition-colors">
                    Outbox
                    <span x-show="unreadOutbox > 0" x-text="unreadOutbox"
                          class="ml-1 inline-flex items-center justify-center rounded-full bg-red-500 text-white text-xs w-5 h-5"></span>
                </button>
            </div>
        </div>
    </div>

    <!-- Compose modal -->
    <div x-show="showCompose" x-cloak class="fixed inset-0 z-50 flex items-center justify-center bg-black/40"
         @keydown.escape.window="showCompose = false">
        <div @click.outside="showCompose = false"
             class="bg-white rounded-xl shadow-xl w-full max-w-lg mx-4">
            <div class="flex items-center justify-between px-6 py-4 border-b border-gray-200">
                <h2 class="text-lg font-semibold text-gray-900">New Message</h2>
                <button @click="showCompose = false" class="text-gray-400 hover:text-gray-600">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <form @submit.prevent="submitCompose()" class="px-6 py-4 space-y-4">
                <!-- From -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">From <span class="text-red-500">*</span></label>
                    <select x-model="compose.stakeholderIdx"
                            class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500"
                            required>
                        <option value="" disabled>Select a stakeholder...</option>
                        <template x-for="(s, idx) in stakeholders" :key="idx">
                            <option :value="idx" x-text="s.name + ' (' + s.email + ')'"></option>
                        </template>
                    </select>
                </div>
                <!-- Subject -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Subject</label>
                    <input x-model="compose.subject" type="text" placeholder="Optional subject line"
                           class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500">
                </div>
                <!-- Body -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Body <span class="text-red-500">*</span></label>
                    <textarea x-model="compose.body" rows="5" placeholder="Message body..."
                              class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500"
                              required></textarea>
                </div>
                <!-- Related Task -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Related Task</label>
                    <input x-model="compose.taskId" type="number" min="1" placeholder="Task ID (optional)"
                           class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500">
                </div>
                <!-- Date -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Date</label>
                    <input x-model="compose.date" type="date"
                           class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500">
                </div>
                <!-- Actions -->
                <div class="flex items-center justify-end gap-3 pt-2">
                    <button type="button" @click="showCompose = false"
                            class="rounded-lg border border-gray-300 px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50 transition-colors">
                        Cancel
                    </button>
                    <button type="submit" :disabled="composeSending"
                            class="rounded-lg bg-indigo-600 px-4 py-2 text-sm font-medium text-white hover:bg-indigo-700 disabled:opacity-50 transition-colors">
                        <span x-show="!composeSending">Send</span>
                        <span x-show="composeSending">Sending...</span>
                    </button>
                </div>
                <p x-show="composeError" x-text="composeError" class="text-sm text-red-600"></p>
            </form>
        </div>
    </div>

    <!-- Two-column layout (desktop) / single-column with view switching (mobile) -->
    <div class="flex flex-1 min-h-0 rounded-lg shadow-sm ring-1 ring-gray-900/5 bg-white overflow-hidden">
        <!-- Left pane: message list (full width on mobile, 1/3 on md+) -->
        <div :class="mobileView === 'detail' ? 'hidden md:block' : ''"
             class="w-full md:w-1/3 md:border-r border-gray-200 overflow-y-auto">
            <template x-if="loading">
                <div class="flex items-center justify-center py-12 text-sm text-gray-400">Loading...</div>
            </template>
            <template x-if="!loading && messages.length === 0">
                <div class="flex items-center justify-center py-12 text-sm text-gray-400">No messages.</div>
            </template>
            <ul class="divide-y divide-gray-100">
                <template x-for="msg in messages" :key="msg.id">
                    <li @click="selectMessage(msg)"
                        :class="selectedId === msg.id ? 'bg-indigo-50 border-l-2 border-indigo-600' : 'border-l-2 border-transparent hover:bg-gray-50'"
                        class="cursor-pointer px-4 py-3 transition-colors">
                        <div class="flex items-center justify-between">
                            <span :class="msg.read ? 'font-normal text-gray-700' : 'font-semibold text-gray-900'"
                                  class="text-sm truncate" x-text="tab === 'inbound' ? msg.sender : msg.recipient"></span>
                            <span class="text-xs text-gray-400 whitespace-nowrap ml-2" x-text="formatDate(msg.date)"></span>
                        </div>
                        <div class="flex items-center mt-1">
                            <span x-show="!msg.read" class="h-2 w-2 rounded-full bg-indigo-600 mr-2 flex-shrink-0"></span>
                            <p :class="msg.read ? 'text-gray-500' : 'text-gray-700'"
                               class="text-sm truncate" x-text="msg.subject"></p>
                        </div>
                    </li>
                </template>
            </ul>
        </div>

        <!-- Right pane: reading area (full width on mobile, 2/3 on md+) -->
        <div :class="mobileView === 'list' ? 'hidden md:block' : ''"
             class="w-full md:w-2/3 overflow-y-auto">
            <template x-if="!selected">
                <div class="flex items-center justify-center h-full text-sm text-gray-400">
                    Select a message to read
                </div>
            </template>
            <template x-if="selected">
                <div class="p-6">
                    <!-- Back button (mobile only) -->
                    <button @click="backToList()" class="md:hidden flex items-center text-sm text-indigo-600 hover:text-indigo-800 mb-4">
                        <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                        </svg>
                        Back to list
                    </button>
                    <div class="border-b border-gray-200 pb-4 mb-4">
                        <h2 class="text-lg font-semibold text-gray-900" x-text="selected.subject"></h2>
                        <div class="mt-2 flex flex-wrap items-center gap-x-4 text-sm text-gray-500">
                            <span>From: <span class="text-gray-700" x-text="selected.sender"></span></span>
                            <span>To: <span class="text-gray-700" x-text="selected.recipient"></span></span>
                            <span x-text="formatDate(selected.date)"></span>
                            <template x-if="selectedDetail && selectedDetail.task_id">
                                <a :href="'/projects/' + {{ project_id }} + '/tasks/' + selectedDetail.task_id"
                                   class="text-indigo-600 hover:text-indigo-800 hover:underline">
                                    Task #<span x-text="selectedDetail.task_id"></span>
                                </a>
                            </template>
                        </div>
                    </div>
                    <div class="prose prose-sm max-w-none text-gray-700 whitespace-pre-wrap"
                         x-text="selectedDetail ? selectedDetail.body : ''"></div>
                </div>
            </template>
        </div>
    </div>
</div>

<script>
function messagesApp() {
    const projectId = {{ project_id }};
    const defaultDate = '{{ reference_date }}';
    return {
        tab: 'inbound',
        messages: [],
        selected: null,
        selectedId: null,
        selectedDetail: null,
        loading: false,
        unreadInbox: 0,
        unreadOutbox: 0,
        mobileView: 'list',
        showCompose: false,
        stakeholders: [],
        compose: { stakeholderIdx: '', subject: '', body: '', taskId: '', date: defaultDate },
        composeSending: false,
        composeError: '',

        async init() {
            await this.loadMessages();
            const params = new URLSearchParams(window.location.search);
            if (params.get('compose') === '1') {
                await this.openCompose();
                if (params.get('taskId')) this.compose.taskId = params.get('taskId');
                if (params.get('subject')) this.compose.subject = decodeURIComponent(params.get('subject'));
                // Clean URL without reloading
                window.history.replaceState({}, '', window.location.pathname);
            }
        },

        async loadMessages() {
            this.loading = true;
            try {
                const resp = await fetch(`/api/messages?project_id=${projectId}&direction=${this.tab}`);
                const data = await resp.json();
                this.messages = data.items;
                this.unreadInbox = data.unread_inbox;
                this.unreadOutbox = data.unread_outbox;
                if (this.messages.length > 0 && !this.selected) {
                    this.selectMessage(this.messages[0]);
                }
            } finally {
                this.loading = false;
            }
        },

        switchTab(t) {
            this.tab = t;
            this.selected = null;
            this.selectedId = null;
            this.selectedDetail = null;
            this.mobileView = 'list';
            this.loadMessages();
        },

        backToList() {
            this.mobileView = 'list';
        },

        async selectMessage(msg) {
            this.selected = msg;
            this.selectedId = msg.id;
            this.selectedDetail = null;
            this.mobileView = 'detail';
            if (!msg.read && this.tab === 'inbound') {
                await fetch(`/api/messages/${msg.id}/read?project_id=${projectId}`, { method: 'PATCH' });
                msg.read = true;
                this.unreadInbox = Math.max(0, this.unreadInbox - 1);
            }
            const resp = await fetch(`/api/messages/${msg.id}?project_id=${projectId}`);
            this.selectedDetail = await resp.json();
        },

        async openCompose() {
            this.composeError = '';
            this.compose = { stakeholderIdx: '', subject: '', body: '', taskId: '', date: defaultDate };
            if (this.stakeholders.length === 0) {
                const resp = await fetch(`/api/messages/stakeholders?project_id=${projectId}`);
                this.stakeholders = await resp.json();
            }
            this.showCompose = true;
        },

        async submitCompose() {
            const s = this.stakeholders[this.compose.stakeholderIdx];
            if (!s) { this.composeError = 'Please select a sender.'; return; }
            if (!this.compose.body.trim()) { this.composeError = 'Message body is required.'; return; }
            this.composeSending = true;
            this.composeError = '';
            try {
                const payload = {
                    project_id: projectId,
                    sender_name: s.name,
                    sender_email: s.email,
                    subject: this.compose.subject,
                    body: this.compose.body,
                    task_id: this.compose.taskId ? parseInt(this.compose.taskId) : null,
                    date: this.compose.date || null,
                };
                const resp = await fetch('/api/messages', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                });
                if (!resp.ok) {
                    const err = await resp.json();
                    this.composeError = err.detail || 'Failed to send message.';
                    return;
                }
                this.showCompose = false;
                this.switchTab('inbound');
            } finally {
                this.composeSending = false;
            }
        },

        formatDate(d) {
            if (!d) return '';
            const date = new Date(d);
            return date.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
        }
    };
}
</script>
{% endblock %}
